<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperTech | ULE Supreme v15.2</title>
    <style>
        :root {
            --ht-white: #ffffff;
            --ht-silver: #f2f2f7;
            --ht-accent: #007aff; 
            --ht-text: #1c1c1e;
            --ht-border: #d1d1d6;
            --tsfu-green: #34c759;
            --danger-red: #ff3b30;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --ht-white: #1c1c1e;
            --ht-silver: #000000;
            --ht-accent: #0a84ff;
            --ht-text: #ffffff;
            --ht-border: #38383a;
            --card-bg: #2c2c2e;
        }

        body {
            background-color: var(--ht-silver);
            color: var(--ht-text);
            font-family: -apple-system, sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            transition: background 0.3s;
        }

        #access-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ht-white); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .login-card {
            width: 320px; background: var(--card-bg); padding: 40px;
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center; border: 1px solid var(--ht-border);
        }

        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--ht-border); border-radius: 12px; outline: none; box-sizing: border-box; background: var(--card-bg); color: var(--ht-text); }
        .btn-primary { width: 100%; background: var(--ht-accent); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        #sidebar { width: 240px; background: var(--ht-white); border-right: 1px solid var(--ht-border); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 12px 15px; margin: 5px 0; border-radius: 10px; color: #8e8e93; font-weight: 500; cursor: pointer; }
        .nav-item.active { background: var(--ht-accent); color: #fff; }

        main { flex: 1; overflow-y: auto; padding: 30px; }
        .ai-status { background: #000; color: #fff; padding: 15px; border-radius: 12px; font-size: 12px; margin-bottom: 25px; border-left: 5px solid var(--tsfu-green); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 18px; border: 1px solid var(--ht-border); margin-bottom: 20px; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        video { width: 100%; border-radius: 12px; background: #000; margin-top: 10px; }
        .post { background: var(--ht-silver); padding: 12px; border-radius: 10px; margin-top: 8px; border-left: 3px solid var(--ht-accent); font-size: 13px; }
    </style>
</head>
<body data-theme="light">

    <div id="access-shield">
        <div class="login-card">
            <h1>HYPERTECH</h1>
            <p style="color:#8e8e93; font-size: 13px;">ULE Supreme v15.2</p>
            <input type="email" id="auth-email" placeholder="Imperial Email">
            <button class="btn-primary" onclick="verifyImperial()">Verify Uplink</button>
            <button style="background:none; border:none; color:var(--ht-accent); margin-top:10px;" onclick="guestLogin()">Guest Access</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="font-weight:800; font-size:22px; margin-bottom:25px;">HyperTech</div>
        <nav>
            <div id="nav-dashboard" class="nav-item active" onclick="showTab('dashboard')">Dashboard</div>
            <div id="nav-forum" class="nav-item" onclick="showTab('forum')">Imperial Chat</div>
            <div id="nav-live" class="nav-item" onclick="showTab('live')">Live Recorder</div>
            <div id="nav-settings" class="nav-item" onclick="showTab('settings')">Settings</div>
        </nav>
        <div style="margin-top:auto; font-size:10px; color:#888;">
            UPLINK: <strong>real.hypertech.inc</strong>
        </div>
    </aside>

    <main>
        <div class="ai-status">
            UNIT: <span id="unit-name">...</span> | 144Hz | <span style="color:var(--tsfu-green);">TSFU</span>
        </div>

        <div id="view-dashboard" class="tab-view active">
            <div class="card">
                <h2>Empire Hub</h2>
                <p>Welcome back, King Zarek 1. All systems 🟩 nominal.</p>
            </div>
        </div>

        <div id="view-forum" class="tab-view">
            <div class="card">
                <h2>Global Imperial Chat</h2>
                <textarea id="post-text" placeholder="Broadcast to the Empire..."></textarea>
                <button class="btn-primary" onclick="savePost()">Push to Cloud</button>
                <div id="forum-feed" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="view-live" class="tab-view">
            <div class="card">
                <h2>Imperial Recorder</h2>
                <video id="video-preview" autoplay playsinline muted></video>
                <button class="btn-primary" style="margin-top:10px; background:var(--danger-red);" onclick="startMedia()">Engage Camera</button>
            </div>
        </div>

        <div id="view-settings" class="tab-view">
            <div class="card">
                <h2>Settings</h2>
                <button class="btn-primary" onclick="toggleTheme()">Toggle Dark Mode</button>
                <button class="btn-primary" style="margin-top:10px; background:#8e8e93;" onclick="clearLogs()">Wipe Local Logs</button>
            </div>
        </div>
    </main>

    <script>
        const ADMINS = ["real.hypertech.inc@gmail.com", "pepica104@outlook.com", "kingzarek4456@gmail.com"];
        let currentUser = localStorage.getItem('ht_user') || "";

        function verifyImperial() {
            const input = document.getElementById('auth-email').value.toLowerCase().trim();
            if (ADMINS.includes(input)) {
                currentUser = input;
                localStorage.setItem('ht_user', input);
                unlockUI();
            } else { alert("DENIED."); }
        }

        function guestLogin() { currentUser = "GUEST"; unlockUI(); }

        function unlockUI() {
            document.getElementById('access-shield').style.display = 'none';
            document.getElementById('unit-name').innerText = navigator.userAgent.includes("Android") ? "Redmi 15 4G" : "Node";
            loadForum();
            applyTheme();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('ht_theme', theme);
        }

        function applyTheme() {
            const theme = localStorage.getItem('ht_theme') || 'light';
            document.body.setAttribute('data-theme', theme);
        }

        function savePost() {
            const txt = document.getElementById('post-text').value;
            if(!txt) return;
            const posts = JSON.parse(localStorage.getItem('ht_forum') || '[]');
            posts.unshift({ user: currentUser || "Unknown", content: txt, time: new Date().toLocaleTimeString() });
            localStorage.setItem('ht_forum', JSON.stringify(posts));
            document.getElementById('post-text').value = "";
            loadForum();
        }

        function loadForum() {
            const feed = document.getElementById('forum-feed');
            const posts = JSON.parse(localStorage.getItem('ht_forum') || '[]');
            feed.innerHTML = posts.map(p => `<div class="post"><strong>[${p.user}]</strong> <small>${p.time}</small><br>${p.content}</div>`).join('');
        }

        async function startMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('video-preview').srcObject = stream;
            } catch (e) { alert("Hardware Blocked. Check Settings."); }
        }

        function clearLogs() { localStorage.clear(); location.reload(); }

        // Auto-unlock if already logged in
        if(currentUser) unlockUI();
    </script>
</body>
</html>

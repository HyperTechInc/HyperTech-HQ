<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperTech | ULE Supreme v15.6</title>
    <style>
        :root {
            --ht-white: #ffffff; --ht-silver: #f2f2f7; --ht-accent: #007aff; 
            --ht-text: #1c1c1e; --ht-border: #d1d1d6; --tsfu-green: #34c759;
            --danger-red: #ff3b30; --card-bg: #ffffff;
        }
        [data-theme="dark"] {
            --ht-white: #1c1c1e; --ht-silver: #000000; --ht-accent: #0a84ff;
            --ht-text: #ffffff; --ht-border: #38383a; --card-bg: #2c2c2e;
        }
        body { background-color: var(--ht-silver); color: var(--ht-text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        #access-shield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ht-white); z-index: 10000; display: flex; align-items: center; justify-content: center; overflow-y: auto; }
        .login-card { width: 340px; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; border: 1px solid var(--ht-border); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--ht-border); border-radius: 10px; background: var(--card-bg); color: var(--ht-text); outline: none; box-sizing: border-box; }
        .btn-primary { width: 100%; background: var(--ht-accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 5px; }
        #sidebar { width: 220px; background: var(--ht-white); border-right: 1px solid var(--ht-border); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 10px 15px; margin: 4px 0; border-radius: 8px; color: #8e8e93; font-weight: 500; cursor: pointer; font-size: 14px; }
        .nav-item.active { background: var(--ht-accent); color: #fff; }
        .admin-only { border-left: 3px solid var(--danger-red); display: none; }
        main { flex: 1; overflow-y: auto; padding: 25px; }
        .ai-status { background: #000; color: #fff; padding: 12px; border-radius: 10px; font-size: 11px; margin-bottom: 20px; border-left: 4px solid var(--tsfu-green); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--ht-border); margin-bottom: 20px; }
        .tab-view { display: none; } .tab-view.active { display: block; }
        .post { background: var(--ht-silver); padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 12px; border-left: 3px solid var(--ht-accent); }
        video { width: 100%; max-width: 500px; border-radius: 12px; background: #000; }
        .sync-pulse { font-size: 10px; color: var(--tsfu-green); float: right; }
    </style>
</head>
<body data-theme="dark">

    <div id="access-shield">
        <div class="login-card" id="login-form">
            <h1>HYPERTECH</h1>
            <p style="color:#8e8e93; font-size: 12px;">ULE Supreme v15.6</p>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-pass" placeholder="Master Password">
            <button class="btn-primary" onclick="verifyImperial()">Login</button>
            <button class="btn-primary" style="background:#444;" onclick="toggleShield('reg')">Register</button>
            <button style="background:none; border:none; color:var(--ht-accent); margin-top:10px; cursor:pointer;" onclick="guestLogin()">Enter as Guest</button>
        </div>
        <div class="login-card" id="reg-form" style="display:none;">
            <h1>REGISTER</h1>
            <input type="email" id="reg-email" placeholder="Gmail">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn-primary" onclick="registerAccount()">Register</button>
            <button style="background:none; border:none; color:#888; margin-top:10px; cursor:pointer;" onclick="toggleShield('login')">Back</button>
        </div>
    </div>

    <aside id="sidebar">
        <div style="font-weight:800; font-size:20px; margin-bottom:20px;">HyperTech</div>
        <nav id="nav-links">
            <div id="nav-dashboard" class="nav-item admin-only" onclick="showTab('dashboard')">Dashboard</div>
            <div id="nav-husel" class="nav-item" onclick="showTab('husel')">Husel AI</div>
            <div id="nav-forum" class="nav-item" onclick="showTab('forum')">Imperial Forum</div>
            <div id="nav-live" class="nav-item" onclick="showTab('live')">Imperial Live</div>
            <div id="nav-moderation" class="nav-item admin-only" onclick="showTab('moderation')">Moderation</div>
            <div id="nav-settings" class="nav-item" onclick="showTab('settings')">Account</div>
        </nav>
    </aside>

    <main>
        <div class="ai-status">
            UNIT: <span id="unit-name">...</span> | 144Hz | <span style="color:var(--tsfu-green);">TSFU</span>
            <span class="sync-pulse" id="sync-indicator">● SYNCED</span>
        </div>

        <div id="view-dashboard" class="tab-view">
            <div class="card">
                <h2>Admin Dashboard</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-primary" onclick="alert('AI Creating Build...')">AI Build</button>
                    <button class="btn-primary" onclick="alert('AI Core Creation Initiated')">AI Create</button>
                </div>
            </div>
        </div>

        <div id="view-forum" class="tab-view">
            <div class="card">
                <h2>Imperial Forum</h2>
                <div id="forum-controls">
                    <textarea id="post-text" placeholder="Broadcast..."></textarea>
                    <input type="text" id="post-img" placeholder="Image URL">
                    <button class="btn-primary" onclick="savePost()">Post</button>
                </div>
                <div id="forum-feed"></div>
            </div>
        </div>

        <div id="view-live" class="tab-view">
            <div class="card">
                <h2>Imperial Live</h2>
                <video id="video-preview" autoplay playsinline></video>
                <div id="admin-cam-controls" style="display:none; margin-top:10px;">
                    <button class="btn-primary" onclick="startCam()">Start</button>
                    <button class="btn-primary" style="background:red;" onclick="stopCam()">Stop</button>
                    <button class="btn-primary" style="background:#444;" onclick="flipCam()">Rotate</button>
                </div>
                <p id="viewer-msg" style="display:none; font-style:italic;">Viewing Mode: Recording Restricted.</p>
            </div>
        </div>

        <div id="view-moderation" class="tab-view">
            <div class="card"><h2>User & Guest Vault</h2><div id="moderation-feed"></div></div>
        </div>

        <div id="view-settings" class="tab-view">
            <div class="card">
                <h2>Account Customization</h2>
                <p>Role: <strong id="user-role-display"></strong></p>
                <input type="text" id="custom-name" placeholder="Change Display Name">
                <button class="btn-primary" onclick="toggleTheme()">Toggle Dark Mode</button>
                <button class="btn-primary" style="background:red; margin-top:10px;" onclick="logout()">Logout</button>
            </div>
        </div>
    </main>

    <script>
        const ADMINS = ["real.hypertech.inc@gmail.com", "pepica104@outlook.com", "kingzarek4456@gmail.com"];
        let currentUser = JSON.parse(localStorage.getItem('ht_session')) || null;
        let stream = null; let facingMode = "user";

        function toggleShield(t) { 
            document.getElementById('login-form').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('reg-form').style.display = t === 'reg' ? 'block' : 'none';
        }

        function registerAccount() {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            let u = JSON.parse(localStorage.getItem('ht_users') || '[]');
            u.push({ email: e, pass: p, rank: "Member" });
            localStorage.setItem('ht_users', JSON.stringify(u));
            alert("Registered!"); toggleShield('login');
        }

        function verifyImperial() {
            const e = document.getElementById('auth-email').value.toLowerCase().trim();
            const p = document.getElementById('auth-pass').value;
            const users = JSON.parse(localStorage.getItem('ht_users') || '[]');
            const match = users.find(u => u.email === e && u.pass === p);
            
            if(ADMINS.includes(e) && p === "pero7373") currentUser = { email: e, rank: "Admin" };
            else if(match) currentUser = { email: e, rank: "Member" };
            else return alert("Access Denied");

            localStorage.setItem('ht_session', JSON.stringify(currentUser));
            unlockUI();
        }

        function guestLogin() {
            const gid = "Guest" + Math.floor(1000 + Math.random() * 9000);
            currentUser = { email: gid, rank: "Guest" };
            let guests = JSON.parse(localStorage.getItem('ht_guests') || '[]');
            guests.push({ id: gid, time: new Date().toLocaleTimeString() });
            localStorage.setItem('ht_guests', JSON.stringify(guests));
            unlockUI();
        }

        function unlockUI() {
            document.getElementById('access-shield').style.display = 'none';
            document.getElementById('user-role-display').innerText = currentUser.rank;
            document.getElementById('unit-name').innerText = navigator.userAgent.includes("Android") ? "Redmi 15 4G" : "Node";

            if(currentUser.rank === "Admin") {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                document.getElementById('admin-cam-controls').style.display = 'block';
                showTab('dashboard');
            } else {
                document.getElementById('viewer-msg').style.display = 'block';
                document.getElementById('forum-controls').style.display = (currentUser.rank === "Guest") ? "none" : "block";
                showTab('forum');
            }
            loadForum(); loadModeration(); setInterval(loadForum, 5000);
        }

        function showTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function savePost() {
            const posts = JSON.parse(localStorage.getItem('ht_forum') || '[]');
            posts.unshift({ user: currentUser.email, content: document.getElementById('post-text').value, img: document.getElementById('post-img').value, time: new Date().toLocaleTimeString() });
            localStorage.setItem('ht_forum', JSON.stringify(posts)); loadForum();
        }

        function loadForum() {
            const feed = document.getElementById('forum-feed');
            const posts = JSON.parse(localStorage.getItem('ht_forum') || '[]');
            feed.innerHTML = posts.map(p => `<div class="post"><strong>[${p.user}]</strong> <small>${p.time}</small><br>${p.content}${p.img ? `<br><img src="${p.img}" style="width:100%">` : ''}</div>`).join('');
        }

        function loadModeration() {
            if(currentUser.rank !== "Admin") return;
            const u = JSON.parse(localStorage.getItem('ht_users') || '[]');
            const g = JSON.parse(localStorage.getItem('ht_guests') || '[]');
            document.getElementById('moderation-feed').innerHTML = u.map(x => `<p>User: ${x.email} | PW: ${x.pass}</p>`).join('') + g.map(x => `<p>Guest Node: ${x.id} [Active]</p>`).join('');
        }

        async function startCam() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode }, audio: true });
            document.getElementById('video-preview').srcObject = stream;
        }

        function stopCam() { stream.getTracks().forEach(t => t.stop()); }
        function flipCam() { facingMode = facingMode === "user" ? "environment" : "user"; startCam(); }
        function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
        function logout() { localStorage.removeItem('ht_session'); location.reload(); }
    </script>
</body>
</html>

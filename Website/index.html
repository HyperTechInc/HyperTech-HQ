<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperTech | ULE Supreme v17.0</title>
    <style>
        :root { 
            --accent: #0a84ff; --bg: #000000; --card: #1c1c1e; --text: #ffffff; 
            --green: #34c759; --danger: #ff3b30; --border: #333333; --warn: #ffcc00;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR NAVIGATION */
        #sidebar { width: 240px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; color: #888; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; display: flex; align-items: center; }
        .nav-item:hover { background: #111; color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; }
        .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--green); }
        
        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 20px; background: #050505; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tab-view { display: none; }
        .tab-view.active { display: block; animation: fadeIn 0.3s ease; }

        /* MODERATION ARSENAL */
        .mod-row { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #111; border-radius: 12px; margin-bottom: 10px; }
        .mod-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .m-btn { padding: 6px 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; color: #fff; }
        
        /* INPUTS */
        .btn-main { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; }
        input, textarea { width: 100%; padding: 12px; background: #2c2c2e; border: 1px solid #444; border-radius: 10px; color: #fff; margin: 8px 0; box-sizing: border-box; outline: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <aside id="sidebar">
        <img id="pfp-sidebar" src="https://via.placeholder.com/70" style="width:70px; height:70px; border-radius:50%; border:3px solid var(--accent); object-fit: cover;">
        <div id="side-name" style="font-weight:900; margin-top:15px; font-size:18px;">EMPEROR MIK</div>
        <div style="font-size:11px; margin-bottom:20px;"><span class="status-dot"></span> GEMINI ONLINE</div>
        
        <nav>
            <div class="nav-item active" onclick="tab('comm', this)">📱 Imperial Comm</div>
            <div class="nav-item" onclick="tab('mod', this)">⚖️ Moderation</div>
            <div class="nav-item" onclick="tab('settings', this)">⚙️ Settings</div>
            <div class="nav-item" onclick="tab('autofix', this)">🛠️ AutoFix</div>
        </nav>
    </aside>

    <main>
        <div id="view-comm" class="tab-view active">
            <div class="card" style="height: 550px; display: flex; flex-direction: column;">
                <h3>Global Empire Feed</h3>
                <div id="chat-feed" style="flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:12px; padding:15px; margin-bottom:10px; border:1px solid var(--border);">
                    <div style="color:var(--accent); font-weight:bold;">[SYSTEM]: Gemini connected via bosanskasirnica001@gmail.com</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="m-in" placeholder="Command...">
                    <button onclick="send()" style="width:80px; background:var(--accent); border:none; border-radius:10px; color:#fff;">Send</button>
                </div>
            </div>
        </div>

        <div id="view-mod" class="tab-view">
            <div class="card">
                <h2>Moderation Arsenal</h2>
                <textarea id="mod-reason" placeholder="Penalty Message (e.g. Clanker activity)..."></textarea>
                <div class="mod-row" id="target-1">
                    <div><strong>Guest_771</strong></div>
                    <div class="mod-btns">
                        <button class="m-btn" style="background:var(--warn); color:#000;" onclick="mod('Warned', 'target-1')">WARN</button>
                        <button class="m-btn" style="background:#5856d6;" onclick="mod('Timed Out', 'target-1')">TIME</button>
                        <button class="m-btn" style="background:#af52de;" onclick="mod('T-Banned', 'target-1', true)">T-BAN</button>
                        <button class="m-btn" style="background:var(--danger);" onclick="mod('Perm-Banned', 'target-1', true)">PERM</button>
                    </div>
                </div>
                <div id="mod-logs" style="font-family:monospace; font-size:11px; color:var(--green); margin-top:10px;"></div>
            </div>
        </div>

        <div id="view-settings" class="tab-view">
            <div class="card">
                <h2>Imperial Settings</h2>
                <p><strong>Uplink:</strong> bosanskasirnica001@gmail.com</p>
                <input type="text" id="new-name" placeholder="Change Imperial Name...">
                <button class="btn-main" onclick="updateName()" style="margin-bottom:20px;">Apply Identity</button>
                <label style="color:var(--danger);">Security Sector</label>
                <button class="btn-main" style="background:var(--danger);" onclick="forceLogout()">⚠️ FORCE LOGOUT & WIPE</button>
            </div>
        </div>
        
        <div id="view-autofix" class="tab-view">
            <div class="card">
                <h2>AutoFix Engine</h2>
                <button class="btn-main" onclick="runFix()">EXECUTE GLOBAL REPAIR</button>
                <div id="f-log" style="font-family:monospace; color:var(--green); margin-top:15px;"></div>
            </div>
        </div>
    </main>

    <script>
        function tab(id, el) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
        }

        function send() {
            const i = document.getElementById('m-in');
            if(!i.value) return;
            const f = document.getElementById('chat-feed');
            f.innerHTML += `<div><strong>You:</strong> ${i.value}</div>`;
            i.value = ""; f.scrollTop = f.scrollHeight;
        }

        function mod(act, id, kick = false) {
            const reason = document.getElementById('mod-reason').value || "Standard purge.";
            document.getElementById('mod-logs').innerHTML += `[${new Date().toLocaleTimeString()}] ${act}: ${reason}<br>`;
            if(kick) {
                document.getElementById(id).style.opacity = "0.2";
                document.getElementById(id).innerHTML = "ELIMINATED";
            }
            alert(act + " applied. Reason: " + reason);
        }

        function updateName() {
            const n = document.getElementById('new-name').value;
            if(n) { document.getElementById('side-name').innerText = n; alert("Name Updated."); }
        }

        function forceLogout() {
            if(confirm("Confirm Nuclear Wipe?")) { localStorage.clear(); location.reload(); }
        }

        function runFix() {
            document.getElementById('f-log').innerHTML = "> Resyncing 144Hz...<br>> Rebuilding HyperConnect...<br>> 🟩 SPIRE REPAIRED.";
        }
    </script>
</body>
</html>

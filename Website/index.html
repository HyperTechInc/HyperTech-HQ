<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperTech | ULE Supreme v15.8</title>
    <style>
        :root {
            --ht-white: #ffffff; --ht-silver: #f2f2f7; --ht-accent: #007aff; 
            --ht-text: #1c1c1e; --ht-border: #d1d1d6; --tsfu-green: #34c759;
            --danger-red: #ff3b30; --card-bg: #ffffff;
        }
        [data-theme="dark"] {
            --ht-white: #1c1c1e; --ht-silver: #000000; --ht-accent: #0a84ff;
            --ht-text: #ffffff; --ht-border: #38383a; --card-bg: #2c2c2e;
        }
        body { background-color: var(--ht-silver); color: var(--ht-text); font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #access-shield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ht-white); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 340px; background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--ht-border); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--ht-border); border-radius: 10px; background: var(--card-bg); color: var(--ht-text); outline: none; box-sizing: border-box; }
        .btn-primary { width: 100%; background: var(--ht-accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        #sidebar { width: 220px; background: var(--ht-white); border-right: 1px solid var(--ht-border); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 10px 15px; margin: 4px 0; border-radius: 8px; color: #8e8e93; cursor: pointer; font-size: 14px; }
        .nav-item.active { background: var(--ht-accent); color: #fff; }
        .admin-only { border-left: 3px solid var(--danger-red); display: none; }
        main { flex: 1; overflow-y: auto; padding: 25px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--ht-border); margin-bottom: 20px; }
        .tab-view { display: none; } .tab-view.active { display: block; }
        #pfp-display { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--ht-accent); margin-bottom: 10px; }
    </style>
</head>
<body data-theme="dark">

    <div id="access-shield">
        <div class="login-card">
            <h1>HYPERTECH</h1>
            <input type="email" id="auth-email" placeholder="real.hypertech.inc@gmail.com">
            <input type="password" id="auth-pass" placeholder="Master Password">
            <button class="btn-primary" onclick="verifyImperial()">Login</button>
        </div>
    </div>

    <aside id="sidebar">
        <img id="pfp-sidebar" src="https://via.placeholder.com/60" style="width:60px; border-radius:50%; margin-bottom:10px;">
        <div id="side-name" style="font-weight:800; margin-bottom:20px;">User</div>
        <nav>
            <div id="nav-dashboard" class="nav-item admin-only" onclick="showTab('dashboard')">Dashboard</div>
            <div id="nav-sandbox" class="nav-item admin-only" onclick="showTab('sandbox')">Admin Sandbox</div>
            <div id="nav-husel" class="nav-item" onclick="showTab('husel')">Husel AI</div>
            <div id="nav-settings" class="nav-item" onclick="showTab('settings')">Account</div>
        </nav>
    </aside>

    <main>
        <div id="view-dashboard" class="tab-view">
            <div class="card">
                <h2>AI Architect Panel</h2>
                <input type="text" id="ai-build-input" placeholder="Enter Build Specs...">
                <button class="btn-primary" onclick="triggerAI('Build')">Execute AI Build</button>
                <input type="text" id="ai-create-input" placeholder="Enter Creation Logic..." style="margin-top:15px;">
                <button class="btn-primary" onclick="triggerAI('Create')">Execute AI Create</button>
                <div id="arch-log" style="margin-top:10px; font-size:12px; color:var(--tsfu-green);"></div>
            </div>
        </div>

        <div id="view-husel" class="tab-view">
            <div class="card">
                <h2>Husel AI Core</h2>
                <textarea id="husel-input" placeholder="Ask Husel..."></textarea>
                <button class="btn-primary" onclick="askHusel()">Transmit to Husel</button>
                <div id="husel-output" style="margin-top:15px; padding:10px; background:rgba(0,0,0,0.2); border-radius:10px;">AI: Awaiting Signal...</div>
            </div>
        </div>

        <div id="view-sandbox" class="tab-view">
            <div class="card">
                <h2>Admin Sandbox 🧪</h2>
                <button class="btn-primary" onclick="sandboxEvent('ŉ NUCLEAR')">Trigger ŉ EVENT</button>
                <button class="btn-primary" style="margin-top:10px;" onclick="sandboxEvent('MISO OVERRIDE')">Run MISO PRO</button>
                <div id="sandbox-log" style="background:#000; color:#0f0; padding:10px; margin-top:10px; height:100px; overflow:hidden;">Terminal Ready...</div>
            </div>
        </div>

        <div id="view-settings" class="tab-view">
            <div class="card">
                <h2>Account Customization</h2>
                <img id="pfp-preview" src="https://via.placeholder.com/60" style="width:80px; height:80px; border-radius:50%;">
                <input type="text" id="new-name" placeholder="New Display Name">
                <input type="text" id="new-pfp" placeholder="PFP Image URL">
                <button class="btn-primary" onclick="applyCustomization()">Apply & Save</button>
                <button class="btn-primary" style="background:red; margin-top:10px;" onclick="location.reload()">Logout</button>
            </div>
        </div>
    </main>

    <script>
        const ADMINS = ["real.hypertech.inc@gmail.com", "pepica104@outlook.com", "kingzarek4456@gmail.com"];
        let user = JSON.parse(localStorage.getItem('ht_v15')) || null;

        function verifyImperial() {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if(ADMINS.includes(e) && p === "pero7373") {
                user = { email: e, rank: "Admin", name: "Emperor", pfp: "https://via.placeholder.com/60" };
                localStorage.setItem('ht_v15', JSON.stringify(user));
                unlockUI();
            } else { alert("WRONG KEY"); }
        }

        function unlockUI() {
            document.getElementById('access-shield').style.display = 'none';
            document.getElementById('side-name').innerText = user.name;
            document.getElementById('pfp-sidebar').src = user.pfp;
            if(user.rank === "Admin") document.querySelectorAll('.admin-only').forEach(i => i.style.display = 'block');
            showTab('dashboard');
        }

        function applyCustomization() {
            user.name = document.getElementById('new-name').value || user.name;
            user.pfp = document.getElementById('new-pfp').value || user.pfp;
            localStorage.setItem('ht_v15', JSON.stringify(user));
            location.reload();
        }

        function askHusel() {
            const input = document.getElementById('husel-input').value;
            document.getElementById('husel-output').innerText = "Husel: Analyzing '" + input + "'... Protocol TSFU Active.";
        }

        function triggerAI(type) {
            const val = document.getElementById('ai-' + type.toLowerCase() + '-input').value;
            document.getElementById('arch-log').innerText = "AI " + type + " Success: " + val;
        }

        function sandboxEvent(e) {
            document.getElementById('sandbox-log').innerText += "\n> " + e + " EXECUTED.";
        }

        function showTab(id) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        if(user) unlockUI();
    </script>
</body>
</html>
